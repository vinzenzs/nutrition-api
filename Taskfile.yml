version: '3'

# kazper Taskfile.
#
# Run `task --list` to see available targets, or `task dev` to bring up the
# local environment with one command.

silent: true

vars:
  POSTGRES_CONTAINER: nutrition-pg          # container name; matches compose.yml
  POSTGRES_VOLUME: nutrition-pg-data        # named volume from compose.yml
  COMPOSE_FILE: compose.yml
  BIN: bin/kazper
  INSTALL_PATH:
    sh: echo "$HOME/.local/bin/kazper"
  MIGRATIONS_DIR: internal/store/migrations
  DATABASE_URL: postgres://nutrition:nutrition@localhost:5432/nutrition?sslmode=disable
  GARMIN_BRIDGE_DIR: apps/garmin-bridge
  GARMIN_BRIDGE_PORT: '8090'              # NOT 8080 — that's the backend (task dev)

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:
    desc: Compile the binary to {{.BIN}}
    cmds:
      - go build -o {{.BIN}} ./cmd/kazper

  run:
    desc: Run the REST API from source (uses current env)
    cmds:
      - go run ./cmd/kazper serve

  test:
    desc: Run the full test suite
    cmds:
      - go test ./...

  vet:
    desc: Run go vet across the module
    cmds:
      - go vet ./...

  swag:
    desc: Regenerate the OpenAPI docs into docs/
    cmds:
      - swag init -g cmd/kazper/main.go -o docs

  install:
    desc: Build and copy the binary to ~/.local/bin/kazper
    deps: [build]
    cmds:
      - mkdir -p "$(dirname {{.INSTALL_PATH}})"
      - cp {{.BIN}} {{.INSTALL_PATH}}
      # Re-sign in place. macOS kills binaries whose ad-hoc signature has been
      # invalidated by post-build mutation — `cp` across some volumes drops the
      # xattrs the signature relies on, which manifests as the MCP supervisor
      # silently restarting forever (Code Signature Invalid in Console.app).
      # Cheap insurance; idempotent.
      - codesign --force --sign - {{.INSTALL_PATH}}
      - echo "installed {{.INSTALL_PATH}}"

  mcp:install:
    desc: Alias for `install` — the same binary serves REST and MCP via `kazper mcp`
    cmds:
      - task: install

  # ---- Migrations ----

  migrate:
    desc: Apply pending migrations using the binary (prod parity)
    deps: [build]
    env:
      DATABASE_URL: '{{.DATABASE_URL}}'
    cmds:
      - '{{.BIN}} migrate'

  migrate:up:
    desc: Apply pending migrations via the golang-migrate CLI
    cmds:
      - go run -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate -path {{.MIGRATIONS_DIR}} -database "{{.DATABASE_URL}}" up

  migrate:down:
    desc: Roll back one migration via the golang-migrate CLI
    cmds:
      - go run -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate -path {{.MIGRATIONS_DIR}} -database "{{.DATABASE_URL}}" down 1

  migrate:new:
    desc: 'Scaffold a new migration pair (usage: task migrate:new NAME=add_widget)'
    requires:
      vars: [NAME]
    cmds:
      - go run -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate create -ext sql -dir {{.MIGRATIONS_DIR}} -seq {{.NAME}}

  # ---- Local Postgres lifecycle ----

  db:up:
    desc: Start Postgres via docker compose (idempotent; data persists in volume {{.POSTGRES_VOLUME}})
    cmds:
      - |
        set -eu

        # Pick a compose runtime: prefer `docker compose` (v2 plugin shipped
        # with Docker Desktop and modern docker.io), fall back to
        # `podman compose` for podman-only hosts.
        if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
          COMPOSE="docker compose"
          RUNTIME=docker
        elif command -v podman >/dev/null 2>&1 && podman compose version >/dev/null 2>&1; then
          COMPOSE="podman compose"
          RUNTIME=podman
        else
          echo "no docker/podman compose runtime found in PATH" >&2
          echo "install Docker Desktop, docker.io with the compose-plugin, or podman ≥ 4.x" >&2
          exit 1
        fi

        # One-shot migration from the legacy `docker run` flow: a container
        # named {{.POSTGRES_CONTAINER}} created without compose labels will
        # block `compose up`. Detect it (no compose label) and evict so
        # compose can take over the name. Safe — the new volume already
        # holds the data.
        if $RUNTIME ps -aq -f "name=^{{.POSTGRES_CONTAINER}}$" | grep -q .; then
          if ! $RUNTIME inspect {{.POSTGRES_CONTAINER}} --format '{{`{{ index .Config.Labels "com.docker.compose.project" }}`}}' 2>/dev/null | grep -q .; then
            echo "removing legacy non-compose container {{.POSTGRES_CONTAINER}} (data volume is unaffected)"
            $RUNTIME rm -f {{.POSTGRES_CONTAINER}} >/dev/null
          fi
        fi

        # `up -d postgres` is a no-op when already running; otherwise it
        # creates (or restarts) the container and attaches the volume.
        $COMPOSE -f {{.COMPOSE_FILE}} up -d postgres >/dev/null

        # Wait for the healthcheck to flip to healthy. `pg_isready` from the
        # host would race a not-yet-ready listener; running it inside the
        # container hits the local socket and is more reliable.
        for i in $(seq 1 60); do
          if $RUNTIME exec {{.POSTGRES_CONTAINER}} pg_isready -U nutrition -d nutrition -q 2>/dev/null; then
            echo "postgres ready (compose: $COMPOSE; volume: {{.POSTGRES_VOLUME}})"
            exit 0
          fi
          sleep 0.2
        done

        echo "postgres did not become ready in time" >&2
        exit 1

  db:down:
    desc: Stop and remove the Postgres container (volume {{.POSTGRES_VOLUME}} survives)
    cmds:
      - |
        set -eu
        if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
          COMPOSE="docker compose"
        elif command -v podman >/dev/null 2>&1 && podman compose version >/dev/null 2>&1; then
          COMPOSE="podman compose"
        else
          echo "no docker/podman compose runtime found in PATH; nothing to stop" >&2
          exit 0
        fi
        $COMPOSE -f {{.COMPOSE_FILE}} down >/dev/null
        echo "stopped {{.POSTGRES_CONTAINER}} (volume {{.POSTGRES_VOLUME}} preserved — use 'task dev:reset' for a clean wipe)"

  db:wipe:
    desc: Stop the container AND delete the data volume ({{.POSTGRES_VOLUME}}) — destructive
    cmds:
      - |
        set -eu
        if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
          COMPOSE="docker compose"
        elif command -v podman >/dev/null 2>&1 && podman compose version >/dev/null 2>&1; then
          COMPOSE="podman compose"
        else
          echo "no docker/podman compose runtime found in PATH" >&2
          exit 1
        fi
        $COMPOSE -f {{.COMPOSE_FILE}} down -v >/dev/null
        echo "removed {{.POSTGRES_CONTAINER}} + volume {{.POSTGRES_VOLUME}}"

  # ---- One-command local dev ----

  _write-env-local:
    internal: true
    status:
      - test -f .env.local
    cmds:
      - |
        cat > .env.local <<'EOF'
        # Auto-generated by `task dev`. Safe defaults for localhost only.
        # Regenerate with: rm .env.local && task dev
        DATABASE_URL=postgres://nutrition:nutrition@localhost:5432/nutrition?sslmode=disable
        MOBILE_API_TOKEN=dev-mobile-token-0000000000aaaa
        AGENT_API_TOKEN=dev-agent-token-0000000000bbbbb
        DEFAULT_USER_TZ=Europe/Berlin
        HTTP_ADDR=:8080
        MIGRATE_ON_START=true
        NUTRITION_API_URL=http://localhost:8080
        MCP_REQUEST_TIMEOUT_SECONDS=10
        SWAGGER_ENABLED=true
        # Garmin integration: enables the /garmin/token endpoints the bridge
        # writes to. The bridge's GARMIN_API_TOKEN must match this value.
        # Enc key is a fixed 32-byte dev key so a token persists across restarts.
        GARMIN_API_TOKEN=dev-garmin-token-0000000000ccccc
        GARMIN_TOKEN_ENC_KEY=ZGV2LWdhcm1pbi1lbmMta2V5LTMyLWJ5dGVzISEhISE=
        EOF
      - echo "wrote .env.local (dev tokens — not for production)"

  dev:
    desc: One-command local — bring up Postgres, ensure .env.local, run the API
    deps: [db:up]
    cmds:
      - task: _write-env-local
      - |
        echo ""
        echo "──────────────────────────────────────────────────────────────"
        echo " kazper dev"
        echo "──────────────────────────────────────────────────────────────"
        echo " API:     http://localhost:8080"
        echo " Health:  http://localhost:8080/healthz"
        echo " Swagger: http://localhost:8080/swagger/index.html"
        echo ""
        echo " Mobile token: $(grep ^MOBILE_API_TOKEN .env.local | cut -d= -f2-)"
        echo " Agent token:  $(grep ^AGENT_API_TOKEN .env.local | cut -d= -f2-)"
        echo " Garmin token:  $(grep ^GARMIN_API_TOKEN .env.local | cut -d= -f2-)"
        echo ""
        echo " Try:     curl http://localhost:8080/healthz"
        echo "──────────────────────────────────────────────────────────────"
        echo ""
      - set -a && . ./.env.local && set +a && go run ./cmd/kazper serve

  dev:reset:
    desc: Tear down container + data volume, remove .env.local, then re-run `task dev`
    cmds:
      - task: db:wipe   # wipes container AND the {{.POSTGRES_VOLUME}} volume
      - rm -f .env.local
      - task: dev

  dev:pair:
    desc: Print a pairing QR for the Flutter companion app (base_url + MOBILE_API_TOKEN)
    cmds:
      - |
        if ! command -v qrencode >/dev/null 2>&1; then
          echo "qrencode not found. Install: brew install qrencode (macOS) / apt-get install qrencode (Linux)" >&2
          exit 1
        fi
        if [ ! -f .env.local ]; then
          echo ".env.local missing — run 'task dev' first to generate it." >&2
          exit 1
        fi
        set -a && . ./.env.local && set +a
        IP=$(ipconfig getifaddr en0 2>/dev/null || ipconfig getifaddr en1 2>/dev/null || hostname -I 2>/dev/null | awk '{print $1}')
        if [ -z "$IP" ]; then
          echo "Could not determine LAN IP. Set IP=<addr> and re-run." >&2
          exit 1
        fi
        PORT="${HTTP_ADDR#:}"
        : "${PORT:=8080}"
        PAYLOAD=$(printf '{"base_url":"http://%s:%s","token":"%s"}' "$IP" "$PORT" "$MOBILE_API_TOKEN")
        echo ""
        echo "Pairing payload: $PAYLOAD"
        echo ""
        qrencode -t ANSIUTF8 "$PAYLOAD"

  app:run:
    desc: Run the Flutter companion app on the connected Android device/emulator
    dir: apps/companion
    cmds:
      - flutter run --dart-define-from-file=dart-defines.json

  app:build:
    desc: Build a release APK of the Flutter companion app
    dir: apps/companion
    cmds:
      - flutter build apk --release --dart-define-from-file=dart-defines.json

  app:test:
    desc: Run the Flutter companion app's Dart tests
    dir: apps/companion
    cmds:
      - flutter test

  app:pair:
    desc: Alias for `task dev:pair` — print the pairing QR for the companion app
    cmds:
      - task: dev:pair

  prod:pair:
    desc: Print a pairing QR for the companion app against production (PROD_BASE_URL + MOBILE_API_TOKEN from .env.prod)
    cmds:
      - |
        if ! command -v qrencode >/dev/null 2>&1; then
          echo "qrencode not found. Install: brew install qrencode (macOS) / apt-get install qrencode (Linux)" >&2
          exit 1
        fi
        if [ -f .env.prod ]; then
          set -a && . ./.env.prod && set +a
        fi
        if [ -z "$PROD_BASE_URL" ]; then
          echo "PROD_BASE_URL not set — add it to .env.prod (e.g. PROD_BASE_URL=https://api.example.com) or pass it inline." >&2
          exit 1
        fi
        if [ -z "$MOBILE_API_TOKEN" ]; then
          echo "MOBILE_API_TOKEN not set — add the production token to .env.prod or pass it inline." >&2
          exit 1
        fi
        BASE_URL="${PROD_BASE_URL%/}"
        PAYLOAD=$(printf '{"base_url":"%s","token":"%s"}' "$BASE_URL" "$MOBILE_API_TOKEN")
        echo ""
        echo "Pairing payload (PROD): $PAYLOAD"
        echo ""
        qrencode -t ANSIUTF8 "$PAYLOAD"

  app:pair:prod:
    desc: Alias for `task prod:pair` — print the production pairing QR for the companion app
    cmds:
      - task: prod:pair

  # ---- Garmin bridge (Python) — local login + sync testing ----
  #
  # The bridge does interactive Garmin SSO and persists the token to the
  # backend's /garmin/token endpoints. To test the login locally:
  #   1. `task dev`                      # backend on :8080 (now garmin-enabled)
  #   2. `task garmin:bridge`            # bridge on :8090 (separate shell)
  #   3. `task garmin:login`             # → {"needs_mfa": true} (usually)
  #   4. `task garmin:login:mfa CODE=123456`
  #   5. `task garmin:sync`              # optional: pull a day and write it
  # Credentials live in apps/garmin-bridge/.env.local (gitignored) — the
  # bridge tasks scaffold it on first run for you to fill in.

  garmin:setup:
    desc: Create the garmin-bridge Python venv and install it (idempotent)
    dir: '{{.GARMIN_BRIDGE_DIR}}'
    status:
      - test -x .venv/bin/python
    cmds:
      - python3 -m venv .venv
      - .venv/bin/pip install -q -e ".[dev]"
      - echo "garmin-bridge venv ready ({{.GARMIN_BRIDGE_DIR}}/.venv)"

  _garmin-env:
    internal: true
    dir: '{{.GARMIN_BRIDGE_DIR}}'
    status:
      - test -f .env.local
    cmds:
      - |
        cat > .env.local <<'EOF'
        # garmin-bridge local env (gitignored). Fill in your Garmin Connect login.
        # GARMIN_API_TOKEN must match the backend's value in the repo-root .env.local.
        GARMIN_EMAIL=
        GARMIN_PASSWORD=
        GARMIN_API_TOKEN=dev-garmin-token-0000000000ccccc
        NUTRITION_API_URL=http://localhost:8080
        SYNC_TZ=Europe/Berlin
        PORT={{.GARMIN_BRIDGE_PORT}}
        LOG_LEVEL=INFO
        EOF
      - echo "scaffolded {{.GARMIN_BRIDGE_DIR}}/.env.local — add GARMIN_EMAIL and GARMIN_PASSWORD"

  garmin:bridge:
    desc: Run the Garmin bridge locally on :{{.GARMIN_BRIDGE_PORT}} (needs `task dev` in another shell)
    deps: [garmin:setup, _garmin-env]
    dir: '{{.GARMIN_BRIDGE_DIR}}'
    cmds:
      - |
        set -a && . ./.env.local && set +a
        if [ -z "${GARMIN_EMAIL:-}" ] || [ -z "${GARMIN_PASSWORD:-}" ]; then
          echo "Set GARMIN_EMAIL and GARMIN_PASSWORD in {{.GARMIN_BRIDGE_DIR}}/.env.local, then re-run." >&2
          exit 1
        fi
        echo ""
        echo "──────────────────────────────────────────────────────────────"
        echo " garmin-bridge  →  http://localhost:${PORT:-{{.GARMIN_BRIDGE_PORT}}}"
        echo " backend        →  $NUTRITION_API_URL"
        echo "──────────────────────────────────────────────────────────────"
        echo " Login:  task garmin:login   then   task garmin:login:mfa CODE=123456"
        echo " Sync:   task garmin:sync    (or   task garmin:sync DATE=2026-06-10)"
        echo "──────────────────────────────────────────────────────────────"
        echo ""
        exec .venv/bin/python -m garmin_bridge

  garmin:login:
    desc: Start Garmin SSO via the local bridge (POST /login)
    cmds:
      - curl -sS -X POST "localhost:{{.GARMIN_BRIDGE_PORT}}/login"; echo

  garmin:login:mfa:
    desc: 'Complete MFA login (usage: task garmin:login:mfa CODE=123456)'
    requires:
      vars: [CODE]
    cmds:
      - |
        curl -sS -X POST "localhost:{{.GARMIN_BRIDGE_PORT}}/login/mfa" -H 'Content-Type: application/json' -d '{"code":"{{.CODE}}"}'; echo

  garmin:sync:
    desc: 'Trigger a sync via the local bridge (optional DATE=2026-06-10 for a specific day)'
    cmds:
      - |
        if [ -n "{{.DATE}}" ]; then
          curl -sS -X POST "localhost:{{.GARMIN_BRIDGE_PORT}}/sync" -H 'Content-Type: application/json' -d '{"date":"{{.DATE}}"}'
        else
          curl -sS -X POST "localhost:{{.GARMIN_BRIDGE_PORT}}/sync"
        fi
        echo
