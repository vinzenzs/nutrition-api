            additionalProperties:
              type: string
            type: object
        "404":
          description: meal_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update fields on a meal entry
      tags:
      - meals
  /meals/freeform:
    post:
      consumes:
      - application/json
      description: Use when the user is logging a meal that doesn't map to a barcode.
        Optionally persists the item as a manual product via `save_as_product`.
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Freeform meal entry
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/meals.freeformRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/meals.MealEntry'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Log a freeform meal entry (no product lookup)
      tags:
      - meals
  /meals/from_photo:
    post:
      consumes:
      - multipart/form-data
      description: Accepts a `multipart/form-data` upload with an `image` part (JPEG
        or PNG; HEIC is rejected with 415 in v1 because we don't ship libheif). The
        backend resizes the image to a max edge of 1568px, sends it to Claude Vision
        with a tool-forced output, and uses the returned `{name, nutriments_per_100g}`
        to create a freeform meal entry. The response carries both the canonical `meal`
        block and an `inference` block reporting model, confidence, token usage, and
        image dimensions. Returns `503 vision_unavailable` when `ANTHROPIC_API_KEY`
        is not configured.
      parameters:
      - description: Optional client-supplied idempotency key. Hash includes the raw
          image bytes so byte-identical replays return the original meal without a
          second Claude call.
        in: header
        name: Idempotency-Key
        type: string
      - description: Image file (JPEG or PNG; HEIC rejected in v1).
        in: formData
        name: image
        required: true
        type: file
      - description: Meal quantity in grams. Default 100.
        in: formData
        name: quantity_g
        type: number
      - description: RFC 3339 timestamp; default now().
        in: formData
        name: logged_at
        type: string
      - description: breakfast | lunch | dinner | snack.
        in: formData
        name: meal_type
        type: string
      - description: Optional free-text note.
        in: formData
        name: note
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/meals.fromPhotoResponse'
        "400":
          description: image_required | quantity_g_invalid | logged_at_invalid | logged_at_too_far_future
            | meal_type_invalid | note_too_long
          schema:
            additionalProperties:
              type: string
            type: object
        "413":
          description: image_too_large with max_bytes hint
          schema:
            additionalProperties: true
            type: object
        "415":
          description: unsupported_media_type
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: vision_rate_limited with retry_after_seconds
          schema:
            additionalProperties: true
            type: object
        "502":
          description: vision_unexpected_response | vision_response_unparseable
          schema:
            additionalProperties: true
            type: object
        "503":
          description: vision_unavailable (ANTHROPIC_API_KEY not configured)
          schema:
            additionalProperties:
              type: string
            type: object
        "504":
          description: vision_timeout | vision_upstream_error with retry_after_seconds
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Log a meal from a photo via Claude Vision
      tags:
      - meals
  /phases:
    get:
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD; max 730 days from from
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{\"phases\": [Phase]}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List training phases intersecting a date window
      tags:
      - training-phases
    post:
      consumes:
      - application/json
      description: A phase is a named date range tagged with a training type. Optionally
        points at a goal template via default_template_id, which becomes the default
        daily goals for every date in [start_date, end_date]. Per-date overrides still
        win.
      parameters:
      - description: Phase fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/trainingphases.createRequest'
      produces:
      - application/json
      responses:
        "201":
          description: '{\"phase\": Phase}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: phase_name_invalid | phase_name_too_long | phase_type_invalid
            | date_range_invalid | date_invalid | invalid_json | template_not_found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a training phase
      tags:
      - training-phases
  /phases/{id}:
    delete:
      parameters:
      - description: Phase id
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: no content
        "400":
          description: phase_id_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: phase_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a training phase
      tags:
      - training-phases
    get:
      parameters:
      - description: Phase id (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{\"phase\": Phase}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: phase_id_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: phase_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a training phase by id
      tags:
      - training-phases
    patch:
      consumes:
      - application/json
      description: 'Tri-state on default_template_id: empty string clears, UUID sets,
        missing leaves unchanged.'
      parameters:
      - description: Phase id
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/trainingphases.patchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"phase\": Phase}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: phase_id_invalid | invalid_json | patch_empty | phase_name_invalid
            | phase_name_too_long | phase_type_invalid | date_invalid | date_range_invalid
            | default_template_id_invalid | template_not_found
          schema:
            additionalProperties: true
            type: object
        "404":
          description: phase_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Partially update a training phase
      tags:
      - training-phases
  /plan:
    get:
      description: Returns planned meals with plan_date in [from, to] inclusive, ordered
        by date then slot (breakfast→snack), each carrying its product name.
      parameters:
      - description: Inclusive lower bound YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive upper bound YYYY-MM-DD
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{ planned_meals: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: range_required | plan_date_invalid
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List planned meals in a date range
      tags:
      - meal-plan
    post:
      consumes:
      - application/json
      description: Persists a meal *selection* for a date+slot. `slot` is one of breakfast|lunch|dinner|snack;
        `product_id` is required and must reference an existing product. The plan
        is NOT a logged meal — it enters meal history only via POST /plan/{id}/eaten.
        Two planned meals may share a date+slot.
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Planned meal
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/mealplan.createRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/mealplan.PlannedMeal'
        "400":
          description: slot_invalid | plan_date_invalid | product_id_required | product_id_invalid
            | quantity_g_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: product_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a planned meal
      tags:
      - meal-plan
  /plan/{id}:
    delete:
      parameters:
      - description: Planned meal UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: no content
        "404":
          description: planned_meal_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a planned meal
      tags:
      - meal-plan
    get:
      parameters:
      - description: Planned meal UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mealplan.PlannedMeal'
        "404":
          description: planned_meal_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a planned meal
      tags:
      - meal-plan
    patch:
      consumes:
      - application/json
      description: Partial update. `status` may move planned↔skipped only; eaten is
        terminal here (use POST /plan/{id}/eaten to log). `quantity_g` and `notes`
        accept JSON null to clear.
      parameters:
      - description: Planned meal UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mealplan.PlannedMeal'
        "400":
          description: slot_invalid | status_invalid | plan_date_invalid | quantity_g_invalid
            | product_id_invalid | plan_entry_eaten_via_endpoint_only
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: planned_meal_not_found | product_not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: plan_entry_eaten_terminal
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a planned meal
      tags:
      - meal-plan
  /plan/{id}/eaten:
    post:
      consumes:
      - application/json
      description: Atomically creates a meal entry through the meals capability (product,
        effective quantity = body override → plan quantity_g → product serving → 100
        g, logged_at = now unless overridden and never in the future, meal_type =
        slot) and flips the plan entry to `eaten`, storing the new meal entry id.
        This is the ONLY path that turns a plan into meal history. If the meal create
        fails the plan stays planned.
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Planned meal UUID
        in: path
        name: id
        required: true
        type: string
      - description: Optional corrections
        in: body
        name: body
        schema:
          $ref: '#/definitions/mealplan.eatenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{ plan: PlannedMeal, meal: MealEntry }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: logged_at_invalid | logged_at_too_far_future | quantity_g_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: planned_meal_not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: plan_entry_already_eaten | plan_entry_not_planned
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark a planned meal eaten (logs a real meal entry)
      tags:
      - meal-plan
  /products:
    get:
      description: Returns the product cache as a paginated list, ordered last_logged_at
        desc then name asc. Combine with `delete` to clean up leftovers.
      parameters:
      - description: 'Filter by source: off | manual | recipe'
        in: query
        name: source
        type: string
      - description: Page size (1..200, default 50)
        in: query
        name: limit
        type: integer
      - description: Page offset (>=0, default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: '{ products: [...], total: N, limit, offset }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: source_invalid | limit_too_large | pagination_invalid
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List products with pagination
      tags:
      - products
    post:
      consumes:
      - application/json
      description: 'Creates a product not sourced from Open Food Facts. Default source
        is "manual". Pass `source: "recipe"` together with an `external_url` to register
        a flat-imported recipe (e.g. from the Cookidoo Chrome extension); the row
        has no `product_components` and `nutriment_computed_at` stays null — distinguishing
        it from composed recipes built via POST /products/recipes. Recipe products
        may carry an optional `ingredients` array of verbatim free-text strings (≤100
        entries, each ≤500 chars); supplying it on a non-recipe product is rejected.'
      parameters:
      - description: Product fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/products.createManualRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/products.Product'
        "400":
          description: invalid_json | name_required | source_invalid | external_url_too_long
            | external_url_invalid | nutriments_invalid | ingredients_require_recipe_source
            | ingredients_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: barcode_already_exists
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a product (manual or flat-imported recipe)
      tags:
      - products
  /products/{id}:
    delete:
      description: Hard-deletes a product. Historical meal_entries get a snapshot
        of the product's current name + nutriments before the FK is nulled, so daily/range
        summaries continue to reflect those meals. If the product is referenced as
        a component of any recipe, the request is rejected with 409 listing the using
        recipes — delete or replace within those recipes first.
      parameters:
      - description: Product UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: no content
        "404":
          description: product_not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: product_in_use_as_component (body includes the using recipes
            list and a hint)
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a product
      tags:
      - products
    get:
      parameters:
      - description: Product UUID
        in: path
        name: id
        required: true
        type: string
      - description: Set to `components` to include a recipe's components
        in: query
        name: expand
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/products.Product'
        "404":
          description: product_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a product by ID
      tags:
      - products
    patch:
      consumes:
      - application/json
      description: Partial update of a product's name, serving size, and per-100g
        nutriments. Only supplied fields change; omitted fields keep their current
        values, and within nutriments_per_100g each supplied key is merged individually.
        Primarily used to set nutriments on a recipe imported from Cookidoo without
        a serving size. Does not touch source, external_url, barcode, or last-logged
        tracking.
      parameters:
      - description: Product UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/products.patchProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/products.Product'
        "400":
          description: invalid_json | name_required | nutriments_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: product_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a product's editable fields
      tags:
      - products
  /products/import/cookidoo:
    post:
      consumes:
      - application/json
      description: 'Fetches a Cookidoo recipe page server-side, parses its Schema.org
        Recipe JSON-LD, and creates a flat-imported source=recipe product with the
        verbatim ingredient list and provenance external_url. Cookidoo reports nutrition
        per serving with no mass: pass `serving_size_g` to convert to per-100g, or
        omit it to create the product without nutriments (the response then carries
        `needs_nutriments: true` and a `nutrition_per_serving` echo to convert and
        PATCH later). Re-importing a URL already present returns 200 with the existing
        product and `already_imported: true`.'
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Cookidoo recipe URL and optional serving size
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/products.importCookidooRequest'
      produces:
      - application/json
      responses:
