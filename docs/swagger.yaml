        "502":
          description: upstream_unexpected_response
          schema:
            additionalProperties:
              type: string
            type: object
        "504":
          description: upstream_timeout
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Look up a product by barcode
      tags:
      - products
  /products/recipes:
