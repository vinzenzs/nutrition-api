  products.Product:
    properties:
      barcode:
        type: string
      brand:
        type: string
      created_at:
        type: string
      external_url:
        description: |-
          ExternalURL records where this product came from when neither OFF nor a
          manual user entry. Today's first user is the Cookidoo extension.
        type: string
      fetched_at:
        type: string
      id:
        type: string
      ingredients:
        description: |-
          Ingredients is an ordered list of verbatim free-text ingredient strings
          (e.g. "100 g Staudensellerie"), populated only for source=recipe products
          imported from a source that carries them (Cookidoo). Nil — and omitted
          from JSON — for every other product. Not interpreted server-side; the
          shopping-list agent does any parsing or merging.
        items:
          type: string
        type: array
      last_logged_at:
        type: string
      last_logged_quantity_g:
        description: |-
          LastLoggedQuantityG is the quantity_g of the most recent meal entry that
          advanced last_logged_at. The phone's scan→log flow defaults to this
          value, dropping a typical scan from 3 taps to 2. Lockstep with
          LastLoggedAt — see internal/products.Repo.TouchLastLoggedAt.
        type: number
      name:
        type: string
      nutriment_computed_at:
        description: |-
          NutrimentComputedAt is set when a recipe product's nutriments were derived
          from its components. Null for non-recipe products.
        type: string
      nutriments_per_100g:
        $ref: '#/definitions/products.Nutriments'
      serving_size_g:
        type: number
      source:
        $ref: '#/definitions/products.Source'
      updated_at:
        type: string
    type: object
