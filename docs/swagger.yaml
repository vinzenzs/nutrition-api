  /race-prep/carb-load:
    get:
      description: 'Stateless, deterministic carb-load math: given a race date and
        a body weight, returns daily carbohydrate targets for the load window and
        race morning. No persistence. The natural follow-up is to translate each entry
        into a goal override via `PUT /goals/overrides/{date}`.'
      parameters:
      - description: Race date YYYY-MM-DD (must be today or later in DEFAULT_USER_TZ)
        in: query
        name: race_date
        required: true
        type: string
      - description: Athlete body weight in kilograms, 30..200
        in: query
        name: body_weight_kg
        required: true
        type: number
      - description: Carb-load days before race day, 0..7 (default 3)
        in: query
        name: days_before
        type: integer
      - description: Load-day multiplier, 1..20 g/kg (default 10)
        in: query
        name: carbs_per_kg_per_day
        type: number
      - description: Race-morning multiplier, 0..10 g/kg (default 2)
        in: query
        name: race_day_carbs_per_kg
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/raceprep.CarbLoadSchedule'
        "400":
          description: race_date_required | body_weight_kg_required | race_date_invalid
            | race_date_in_past | body_weight_kg_invalid | days_before_invalid | carbs_per_kg_per_day_invalid
            | race_day_carbs_per_kg_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Compute a carb-load schedule for a race
      tags:
      - race-prep
  /race-prep/carb-load/apply:
    post:
      consumes:
      - application/json
      description: Same inputs as `GET /race-prep/carb-load`. Computes the schedule,
        then in a single transaction writes the per-day carb target into the `daily_goal_overrides`
        row for each schedule date — merging into existing overrides (preserving non-carb
        fields) or creating new rows. Returns the schedule plus a per-date `applied`
        outcome (`{date, carbs_g_min, created}`). On any per-date failure the whole
        transaction rolls back and zero overrides are persisted.
      parameters:
      - description: Carb-load parameters (same as the GET endpoint)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/raceprep.applyRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/raceprep.ApplyResponse'
        "400":
          description: race_date_required | body_weight_kg_required | race_date_invalid
            | race_date_in_past | body_weight_kg_invalid | days_before_invalid | carbs_per_kg_per_day_invalid
            | race_day_carbs_per_kg_invalid | invalid_json
          schema:
            additionalProperties: true
            type: object
        "500":
          description: apply_failed
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Compute AND apply a carb-load schedule into per-date goal overrides
      tags:
      - race-prep
