          Garmin's daily water-balance estimate (sweat out, activity intake in, goal).
          Same-day-or-null. Distinct from the Hydration block (logged intake).
      nutrition:
        $ref: '#/definitions/dailycontext.NutritionBlock'
      phase:
        allOf:
        - $ref: '#/definitions/dailycontext.PhaseBlock'
        description: nil when no phase covers the date
      recovery:
        allOf:
        - $ref: '#/definitions/recoverymetrics.Snapshot'
        description: |-
          Same-day-or-null Garmin snapshots — no carryover (a stale recovery/fitness
          reading is misleading). nil when no snapshot exists for the date.
      tz:
        type: string
      weight:
        allOf:
        - $ref: '#/definitions/dailycontext.WeightBlock'
        description: nil when no entry ever logged
      workout_fuel:
        description: never nil; empty array on quiet days
        items:
          $ref: '#/definitions/dailycontext.WorkoutFuelLite'
        type: array
      workouts:
        description: never nil; empty array on quiet days
        items:
          $ref: '#/definitions/dailycontext.WorkoutLite'
        type: array
    type: object
  dailycontext.GoalOverrideBlock:
