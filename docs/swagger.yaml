info:
  contact: {}
  description: Personal nutrition tracking REST API. All endpoints under /products,
    /meals, and /summary require a bearer token.
  title: Nutrition API
  version: 0.1.0
paths:
  /chat:
    post:
      consumes:
      - application/json
      description: Runs a server-side Anthropic agent loop scoped to meal planning
        and streams the result as Server-Sent Events. The request body is the full
        client-held transcript ({messages:[{role,content}]}); the server holds no
        conversation state. The response is text/event-stream with four event types
        — `text` (assistant delta), `tool` (name+status+summary), `done` (final message,
        stop_reason, usage), and `error` (typed code). Tools are dispatched as loopback
        REST calls under the caller's bearer token. Returns 503 chat_unavailable when
        ANTHROPIC_API_KEY is unset, and 400 for an empty transcript or a client-supplied
        system message.
      parameters:
      - description: Client-held transcript
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/chat.ChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "400":
          description: invalid_json | empty_transcript | system_role_not_allowed |
            invalid_role
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: chat_unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Stream a nutrition-planning chat turn
      tags:
      - chat
  /context/daily:
    get:
      description: One read that returns the day's adherence + nutrition totals +
        hydration ml + workouts + workout-fuel entries + body-weight state + training-phase
        context + goal-override presence. Composition-only over existing primitives
        — use this as the first call of a session; for deep dives into one slice,
        use the dedicated tools (daily_summary, list_workouts, etc.) which include
        the per-entry detail this aggregator omits.
      parameters:
      - description: Calendar date in YYYY-MM-DD
        in: query
        name: date
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dailycontext.DailyContext'
        "400":
          description: date_invalid | tz_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: context_failed
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Daily context bundle
      tags:
      - daily-context
  /energy/availability:
    get:
      description: 'Per-day EA values + window aggregate, computed from meals (intake),
        workouts (exercise burn) and body weight (composition). Loucks bands: `< 30
        kcal/kg FFM/day = low`, `30-45 = sub_optimal`, `>= 45 = adequate`. FFM resolution
        order: lean_mass_kg query param → body_fat_pct query param + stored body weight
        → most-recent in-window stored body_fat_pct → 85% fallback (loud, flagged
        via `composition.composition_estimated`). Days with workouts missing `kcal_burned`
        are listed in `missing_burn_workout_ids` and excluded from `window.avg_ea`.'
      parameters:
      - description: Inclusive RFC3339 lower bound
        in: query
        name: from
        required: true
        type: string
      - description: Exclusive RFC3339 upper bound; max 92 days from 'from'
        in: query
        name: to
        required: true
        type: string
