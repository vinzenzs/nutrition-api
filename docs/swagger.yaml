        "400":
          description: weight_kg_invalid | body_fat_pct_invalid | muscle_mass_kg_invalid
            | body_water_pct_invalid | bone_mass_kg_invalid | bmi_invalid | logged_at_invalid
            | note_too_long
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: weight_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Partially update a body-weight entry
      tags:
      - body-weight
  /weight/trend:
    get:
      description: Returns one point per calendar date in [from, to], each carrying
        the trailing rolling average over `window_days` days and the `sample_count`
        that fed it. A `sample_count` of 0 means no data in the trailing window; the
        matching `rolling_avg_kg` is null.
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD; max 366-day span
        in: query
        name: to
        required: true
        type: string
      - description: Trailing-window length in days (1..30, default 7)
        in: query
        name: window_days
        type: integer
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/bodyweight.Trend'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | window_days_invalid | tz_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Rolling-average body-weight trend
      tags:
      - body-weight
  /workout-fuel:
    get:
      parameters:
      - description: Inclusive RFC3339 lower bound
        in: query
        name: from
        required: true
        type: string
      - description: Exclusive RFC3339 upper bound
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{ entries: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: window_required | window_invalid | range_too_large
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List workout-fuel entries in a window
      tags:
      - workout-fuel
    post:
      consumes:
      - application/json
      description: 'Records an in-session fueling event — gel, electrolyte drink,
        salt tab, caffeine pill. At least one of quantity_ml/carbs_g/sodium_mg/potassium_mg/caffeine_mg
        MUST be set. `caffeine_mg: 0` means "measured, no caffeine"; omitting means
        "not measured" (NULL). Plain water belongs in /hydration; anything with electrolytes/carbs/caffeine
        belongs here.'
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Workout-fuel entry
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/workoutfuel.createRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/workoutfuel.Entry'
        "400":
          description: name_required | empty_entry | quantity_ml_invalid | carbs_g_invalid
            | sodium_mg_invalid | potassium_mg_invalid | caffeine_mg_invalid | logged_at_invalid
            | logged_at_too_far_future | note_too_long | workout_id_invalid | workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Log a workout-fuel entry
      tags:
      - workout-fuel
  /workout-fuel/{id}:
    delete:
      parameters:
      - description: Workout-fuel entry UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: no content
        "404":
          description: workout_fuel_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a workout-fuel entry
      tags:
      - workout-fuel
    patch:
      consumes:
      - application/json
      description: Any field may be sent. For nullable fields, an explicit JSON `null`
        clears the column (sets it to NULL); omitting the field leaves it untouched.
        `workout_id` additionally honours the empty-string clear sentinel ("") for
        consistency with meals/hydration. PATCH that would leave all five quantitative
        fields null is rejected as `empty_entry`.
      parameters:
      - description: Workout-fuel entry UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update (any subset)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workoutfuel.Entry'
        "400":
          description: name_required | empty_entry | quantity_ml_invalid | carbs_g_invalid
            | sodium_mg_invalid | potassium_mg_invalid | caffeine_mg_invalid | logged_at_invalid
            | logged_at_too_far_future | note_too_long | workout_id_invalid | workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: workout_fuel_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Partially update a workout-fuel entry
      tags:
      - workout-fuel
  /workout-templates:
    get:
      parameters:
      - description: 'Filter by sport: run | bike | swim | strength | other'
        in: query
        name: sport
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{ workout_templates: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: sport_invalid
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List workout templates
      tags:
      - workout-templates
    post:
      consumes:
      - application/json
      description: Create a reusable structured session (sport + ordered steps with
        durations and target zones). `Idempotency-Key` supported.
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Workout template
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/workouttemplates.createRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/workouttemplates.Template'
        "400":
          description: invalid_json | sport_invalid | name_required | estimated_duration_sec_invalid
            | steps_empty | step_type_invalid | intent_invalid | duration_invalid
            | target_invalid | target_range_invalid | repeat_invalid | repeat_nested
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a workout template
      tags:
      - workout-templates
  /workout-templates/{id}:
    delete:
      parameters:
      - description: Template UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: no content
        "404":
          description: workout_template_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a workout template
      tags:
      - workout-templates
    get:
      parameters:
      - description: Template UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workouttemplates.Template'
        "404":
          description: workout_template_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a workout template by id
      tags:
      - workout-templates
    patch:
      consumes:
      - application/json
      description: Any of sport / name / description / estimated_duration_sec / steps
        may be supplied; omitted fields are unchanged. A supplied `steps` array replaces
        the prior steps wholesale.
      parameters:
      - description: Template UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/workouttemplates.patchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workouttemplates.Template'
        "400":
          description: invalid_json | sport_invalid | name_required | estimated_duration_sec_invalid
            | steps_empty | step_type_invalid | intent_invalid | duration_invalid
            | target_invalid | target_range_invalid | repeat_invalid | repeat_nested
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: workout_template_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Partially update a workout template
      tags:
      - workout-templates
  /workouts:
    get:
      parameters:
      - description: Inclusive RFC3339 lower bound
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive RFC3339 upper bound
        in: query
        name: to
        required: true
        type: string
      - description: Narrow to the legs of one brick/multisport session (exact-match
          on session_group)
        in: query
        name: session_group
        type: string
      - description: 'Filter by lifecycle status: planned | completed'
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{ workouts: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: window_required | window_invalid | range_too_large
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List workouts in a time window
      tags:
      - workouts
    post:
      consumes:
      - application/json
      description: Creates a new workout when external_id is absent or unseen; updates
        the existing row when external_id matches an existing workout. Garmin re-syncs
        land here without the writer needing to track sync state.
      parameters:
      - description: Optional client-supplied idempotency key (writers normally rely
          on external_id instead)
        in: header
        name: Idempotency-Key
        type: string
      - description: Workout
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/workouts.createRequest'
      produces:
      - application/json
      responses:
        "200":
          description: UPDATE (external_id collision)
          schema:
            $ref: '#/definitions/workouts.Workout'
        "201":
          description: INSERT
          schema:
            $ref: '#/definitions/workouts.Workout'
        "400":
          description: source_invalid | sport_invalid | window_invalid | started_at_too_far_future
            | kcal_burned_invalid | avg_hr_invalid | tss_invalid | distance_m_invalid
            | avg_power_w_invalid | temperature_c_invalid | sweat_loss_ml_invalid
            | session_group_invalid | status_invalid
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upsert a workout
      tags:
      - workouts
  /workouts/{id}:
    delete:
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: no content
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a workout
      tags:
      - workouts
    get:
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workouts.Workout'
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a workout by id
      tags:
      - workouts
    patch:
      consumes:
      - application/json
      description: 'Accepts `name`, `notes`, `kcal_burned`, `avg_hr`, `tss`, `rpe`,
        `gi_distress_score`, `distance_m`, `avg_power_w`, `temperature_c`, `sweat_loss_ml`,
        `session_group`. `source`, `external_id`, `sport`, `started_at`, `ended_at`
        are immutable — delete and re-create if those are wrong. Tri-state on the
        nullable fields: omit to leave unchanged, value to set, JSON null to clear.'
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      - description: Mutable fields
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workouts.Workout'
        "400":
          description: field_immutable | kcal_burned_invalid | avg_hr_invalid | tss_invalid
            | rpe_invalid | gi_distress_score_invalid | distance_m_invalid | avg_power_w_invalid
            | temperature_c_invalid | sweat_loss_ml_invalid | session_group_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Partially update a workout (mutable fields only)
      tags:
      - workouts
  /workouts/{id}/fueling:
    get:
      description: 'Returns three time-anchored buckets (pre / intra / post), each
        carrying three separate sub-objects of intake around a workout: `nutrition`
        (from meals), `hydration` (from hydration entries), and `workout_fuel` (from
        workout-fuel entries — gels / electrolyte drinks / caffeine). Aggregation
        is by `logged_at` time-window matching, NOT by the `workout_id` tag on intake
        rows — an untagged meal in the pre-window still contributes. Sub-objects are
        unit-isolated: no ml inside `nutrition.totals`, no kcal inside `hydration`
        or `workout_fuel`.'
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      - description: Pre-window length in minutes (default 240, range 0..720)
        in: query
        name: pre_window_min
        type: integer
      - description: Post-window length in minutes (default 60, range 0..720)
        in: query
        name: post_window_min
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workoutfueling.WorkoutFueling'
        "400":
          description: window_invalid
          schema:
            additionalProperties: true
            type: object
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 'Workout fueling: pre / intra / post windows'
      tags:
      - workouts
  /workouts/bulk:
    post:
      consumes:
      - application/json
      description: Each item upserts independently using external_id semantics. Per-item
        validation/persistence failures are reported in the results array; the overall
        response is 200 whenever the request body is well-formed and within the size
        cap. Partial failure is allowed.
      parameters:
      - description: '{ workouts: [Workout, ...] }'
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/workouts.bulkCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{ results: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: bulk_invalid | bulk_empty | bulk_too_large
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Upsert a batch of workouts (max 100 per request)
      tags:
      - workouts
securityDefinitions:
  BearerAuth:
    description: Static bearer token. Use the format `Bearer <token>` with either
      MOBILE_API_TOKEN or AGENT_API_TOKEN.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
