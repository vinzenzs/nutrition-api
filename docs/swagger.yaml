        (≤300 chars); `quantity_text` is opaque ("3 large"), never parsed; `recipe_product_id`
        (if set) must reference an existing product; `plan_date` is bare provenance.
        A single invalid item fails the batch with its index.
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Items
        in: body
        name: body
        required: true
        schema:
