<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Save recipe</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font: 13px/1.4 system-ui, sans-serif;
      width: 360px;
      padding: 12px;
      margin: 0;
    }
    h1 { font-size: 14px; margin: 0 0 8px; }
    .banner {
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .banner.info    { background: #eef4ff; color: #114; }
    .banner.warn    { background: #fff4e1; color: #5a3000; }
    .banner.error   { background: #ffe5e3; color: #7a1f1a; }
    .banner.success { background: #e2f7e9; color: #1e5b34; }
    .banner.hidden  { display: none; }

    fieldset {
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 6px;
      padding: 6px 8px 8px;
      margin: 0 0 8px;
    }
    legend { padding: 0 4px; font-size: 11px; opacity: 0.7; }
    label { display: block; margin: 4px 0 2px; font-size: 11px; }
    input[type="text"], input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 4px 6px;
      font: inherit;
      border: 1px solid rgba(0,0,0,0.25);
      border-radius: 4px;
      background: transparent;
      color: inherit;
    }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }
    button {
      padding: 6px 12px;
      font: inherit;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.2);
      background: #2266ee;
      color: white;
      cursor: pointer;
    }
    button[disabled] {
      background: #bbb;
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      color: inherit;
    }
    .url {
      font-size: 11px;
      opacity: 0.7;
      word-break: break-all;
      margin-top: 4px;
    }
    .ingredients {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 4px;
    }
    .ingredients.hidden { display: none; }
  </style>
</head>
<body>
  <h1>Save Cookidoo recipe</h1>

  <div id="banner-info"    class="banner info    hidden"></div>
  <div id="banner-warn"    class="banner warn    hidden"></div>
  <div id="banner-error"   class="banner error   hidden"></div>
  <div id="banner-success" class="banner success hidden"></div>

  <form id="form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required />

    <div class="row">
      <div>
        <label for="servings">Servings</label>
        <input type="number" id="servings" name="servings" min="1" step="1" />
      </div>
      <div>
        <label for="serving_size_g">Serving size (g) *</label>
        <input type="number" id="serving_size_g" name="serving_size_g" min="1" step="0.1" required />
      </div>
    </div>

    <fieldset>
      <legend>Per 100 g</legend>
      <div class="grid">
        <div><label for="kcal">kcal</label>           <input type="number" id="kcal"      step="0.1" /></div>
        <div><label for="protein_g">protein g</label> <input type="number" id="protein_g" step="0.01" /></div>
        <div><label for="carbs_g">carbs g</label>     <input type="number" id="carbs_g"   step="0.01" /></div>
        <div><label for="fat_g">fat g</label>         <input type="number" id="fat_g"     step="0.01" /></div>
        <div><label for="fiber_g">fiber g</label>     <input type="number" id="fiber_g"   step="0.01" /></div>
        <div><label for="sugar_g">sugar g</label>     <input type="number" id="sugar_g"   step="0.01" /></div>
        <div><label for="salt_g">salt g</label>       <input type="number" id="salt_g"    step="0.001" /></div>
      </div>
    </fieldset>

    <fieldset>
      <legend>Micros per 100 g (optional)</legend>
      <div class="grid">
        <div><label for="iron_mg">iron mg</label>             <input type="number" id="iron_mg"        step="0.01" /></div>
        <div><label for="calcium_mg">calcium mg</label>       <input type="number" id="calcium_mg"     step="0.1"  /></div>
        <div><label for="vitamin_d_mcg">vit D µg</label>      <input type="number" id="vitamin_d_mcg"  step="0.01" /></div>
        <div><label for="vitamin_b12_mcg">vit B12 µg</label>  <input type="number" id="vitamin_b12_mcg" step="0.01" /></div>
        <div><label for="vitamin_c_mg">vit C mg</label>       <input type="number" id="vitamin_c_mg"   step="0.1"  /></div>
        <div><label for="magnesium_mg">magnesium mg</label>   <input type="number" id="magnesium_mg"   step="0.1"  /></div>
        <div><label for="potassium_mg">potassium mg</label>   <input type="number" id="potassium_mg"   step="0.1"  /></div>
        <div><label for="zinc_mg">zinc mg</label>             <input type="number" id="zinc_mg"        step="0.01" /></div>
      </div>
    </fieldset>

    <div class="ingredients" id="ingredients-summary"></div>

    <div class="url" id="external_url"></div>

    <div class="actions">
      <button type="button" id="open-options" class="secondary">Options…</button>
      <button type="submit" id="save" disabled>Save</button>
    </div>
  </form>

  <script src="popup.js"></script>
</body>
</html>
