name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Build + push image and chart for ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Derive chart-version (strip leading v)
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          chart_version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "chart=${chart_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=${{ steps.ver.outputs.tag }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nutrition-api:${{ steps.ver.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/nutrition-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push garmin-bridge image
        uses: docker/build-push-action@v6
        with:
          context: apps/garmin-bridge
          file: apps/garmin-bridge/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/garmin-bridge:${{ steps.ver.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/garmin-bridge:latest
          # Distinct gha cache scope so it never collides with the api image's.
          cache-from: type=gha,scope=bridge
          cache-to: type=gha,mode=max,scope=bridge

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package deploy/helm/nutrition-api/ \
            --version "${{ steps.ver.outputs.chart }}" \
            --app-version "${{ steps.ver.outputs.tag }}" \
            --destination dist/

      - name: Login Helm to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR OCI registry
        run: |
          helm push dist/nutrition-api-${{ steps.ver.outputs.chart }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
