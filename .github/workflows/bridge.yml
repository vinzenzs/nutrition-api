name: bridge

# The Garmin bridge (apps/garmin-bridge) is a Python service, excluded from the
# Go workflows' paths. This job runs its pytest suite on changes that touch it.
on:
  push:
    branches: [main]
    paths:
      - 'apps/garmin-bridge/**'
      - '.github/workflows/bridge.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/garmin-bridge/**'
      - '.github/workflows/bridge.yml'

permissions:
  contents: read

concurrency:
  group: bridge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (garmin-bridge)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/garmin-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/garmin-bridge/pyproject.toml

      - name: Install (with dev extras)
        run: pip install -e ".[dev]"

      - name: pytest
        run: pytest -q
