name: main

on:
  push:
    branches: [main]
    paths-ignore:
      - 'apps/**'
      - 'extensions/**'
      - 'openspec/**'
      - '**/*.md'
      - 'continuity.md'
      - 'roadmap.md'

permissions:
  contents: read
  packages: write

concurrency:
  group: main-image
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build + push :main image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (main + sha-<short>)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION=main-${{ steps.sha.outputs.short }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nutrition-api:main
            ghcr.io/${{ github.repository_owner }}/nutrition-api:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
