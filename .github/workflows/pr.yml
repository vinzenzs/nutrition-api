name: PR

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'apps/**'
      - 'extensions/**'
      - 'openspec/**'
      - '**/*.md'
      - 'continuity.md'
      - 'roadmap.md'

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: vet + test + docker + helm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        # testcontainers boots its own Postgres per package; runner has Docker.
        # Ryuk reaper is already disabled in the storetest harness.
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (no push) — smoke
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          build-args: |
            VERSION=pr-${{ github.event.number }}
            COMMIT=${{ github.sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: helm lint
        run: helm lint deploy/helm/kazper/

      - name: helm template (chart-managed Secret path)
        run: |
          helm template smoke deploy/helm/kazper/ \
            --set secrets.databaseUrl=ci-stub \
            --set secrets.mobileApiToken=ci-stub \
            --set secrets.agentApiToken=ci-stub \
            --debug > /dev/null

      - name: helm template (Ingress + cert-manager path)
        run: |
          helm template smoke deploy/helm/kazper/ \
            --set secrets.databaseUrl=ci-stub \
            --set secrets.mobileApiToken=ci-stub \
            --set secrets.agentApiToken=ci-stub \
            --set ingress.enabled=true \
            --set ingress.host=ci.example \
            --set ingress.tls.enabled=true \
            --set ingress.tls.issuer=letsencrypt-staging \
            --debug > /dev/null
