apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nutrition-api.configMapName" . }}
  labels:
    {{- include "nutrition-api.labels" . | nindent 4 }}
data:
  # Mirrors the README.md Configuration table — every non-secret env var the
  # Viper config layer reads. Keys MUST be the env-var names the binary
  # expects, not camelCase mirrors of values.yaml.
  DEFAULT_USER_TZ: {{ .Values.config.defaultUserTz | quote }}
  MIGRATE_ON_START: {{ .Values.config.migrateOnStart | quote }}
  SWAGGER_ENABLED: {{ .Values.config.swaggerEnabled | quote }}
  OFF_TIMEOUT_SECONDS: {{ .Values.config.offTimeoutSeconds | quote }}
  OFF_USER_AGENT_CONTACT: {{ .Values.config.offUserAgentContact | quote }}
  IDEMPOTENCY_TTL_HOURS: {{ .Values.config.idempotencyTtlHours | quote }}
  CLAUDE_VISION_MODEL: {{ .Values.config.claudeVisionModel | quote }}
  VISION_TIMEOUT_SECONDS: {{ .Values.config.visionTimeoutSeconds | quote }}
  # int64 before quote: a `--set config.mealFromPhotoMaxBytes=N` override is
  # stored as a float64 by Helm and would otherwise render in scientific
  # notation ("1.048576e+07"), which the binary's int64 parser rejects.
  MEAL_FROM_PHOTO_MAX_BYTES: {{ .Values.config.mealFromPhotoMaxBytes | int64 | quote }}
  HTTP_ADDR: ":{{ .Values.service.targetPort }}"
  {{- if .Values.config.garminBridgeUrl }}
  GARMIN_BRIDGE_URL: {{ .Values.config.garminBridgeUrl | quote }}
  {{- end }}
