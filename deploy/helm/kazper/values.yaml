# Default values for kazper.
# See README.md for the install / upgrade walkthrough.

# -- Container image. tag defaults to the chart's appVersion when empty.
image:
  repository: ghcr.io/vinzenzs/kazper
  tag: ""
  pullPolicy: IfNotPresent

# -- Image pull secrets (set if the registry isn't public).
imagePullSecrets: []
#   - name: ghcr-pull

# -- Override the release name in template-rendered object names.
nameOverride: ""
fullnameOverride: ""

# -- Single-replica is the only supported topology in v1. See
#    openspec/specs/deployment-pipeline — Recreate + replicas=1 means the
#    in-process migration on startup is safe.
replicaCount: 1

# -- Pod-level securityContext. Distroless-nonroot image runs as 65532.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

# -- Container-level securityContext.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Resource requests / limits. Defaults sized for a personal cluster.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

service:
  type: ClusterIP
  port: 80
  # -- Pod port. Matches the EXPOSE 8080 in the Dockerfile.
  targetPort: 8080

ingress:
  # -- Set true to render an Ingress. Defaults off so the chart works on
  #    clusters without ingress-nginx installed.
  enabled: false
  # -- Defaults to "nginx"; override for clusters with a different class.
  className: nginx
  # -- Fully-qualified host the API will be reached at.
  host: nutrition.example.com
  # -- Extra annotations merged into the Ingress. The chart adds:
  #     nginx.ingress.kubernetes.io/proxy-body-size: 10m
  #    automatically so /meals/from_photo uploads aren't truncated.
  extraAnnotations: {}
  tls:
    # -- When true, the Ingress carries a tls: section and the
    #    cert-manager.io/cluster-issuer annotation is set.
    enabled: false
    # -- Name of a cert-manager ClusterIssuer that mints the cert.
    issuer: letsencrypt-prod
    # -- Secret to store the cert in. Defaults to "<fullname>-tls".
    secretName: ""

# -- Non-secret config. Mirrors the env vars README.md "Configuration" table.
config:
  defaultUserTz: UTC
  migrateOnStart: true
  swaggerEnabled: false
  offTimeoutSeconds: 5
  offUserAgentContact: "+https://github.com/vinzenzs/kazper"
  idempotencyTtlHours: 24
  claudeVisionModel: claude-sonnet-4-6
  visionTimeoutSeconds: 15
  mealFromPhotoMaxBytes: 10485760
  # -- In-cluster base URL of the garmin-bridge. When set, the backend's
  #    /garmin/login, /garmin/calendar, /garmin/backfill, … proxies forward to
  #    it; empty → those endpoints return 503 garmin_disabled. Typically the
  #    in-cluster Service of the bridge (e.g. http://<release>-garmin-bridge).
  garminBridgeUrl: ""

# -- Reference an externally-managed Secret. When set, the chart will NOT
#    render its own Secret; the Deployment's envFrom uses this name.
#    The Secret must contain keys: DATABASE_URL, MOBILE_API_TOKEN,
#    AGENT_API_TOKEN (and optionally ANTHROPIC_API_KEY, plus GARMIN_API_TOKEN +
#    GARMIN_TOKEN_ENC_KEY when the backend Garmin integration is enabled).
existingSecret: ""

# -- Secret values populated into a chart-managed Secret.
#    REQUIRED when existingSecret is empty:
#       databaseUrl, mobileApiToken, agentApiToken
#    OPTIONAL:
#       anthropicApiKey — empty falls back to 503 vision_unavailable on
#                          /meals/from_photo (existing handler behaviour).
#    Garmin integration (opt-in): set garminApiToken to enable the backend's
#       /garmin/* endpoints under the `garmin` bearer identity (it must equal the
#       garmin-bridge's GARMIN_API_TOKEN). When garminApiToken is set,
#       garminTokenEncKey is REQUIRED — a base64-encoded 32-byte AES-256 key used
#       to encrypt the stored Garmin token at rest. Generate one with:
#           openssl rand -base64 32
#       Leave both empty to keep the backend's Garmin integration disabled.
secrets:
  databaseUrl: ""
  mobileApiToken: ""
  agentApiToken: ""
  anthropicApiKey: ""
  garminApiToken: ""
  garminTokenEncKey: ""

# -- Liveness probe — see openspec/specs/deployment-pipeline for tuning rationale.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- Readiness probe — fast to flip pods out of Service endpoints if
#    Postgres becomes unreachable.
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- ServiceAccount for the pod.
serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# -- garmin-bridge: opt-in Garmin Connect → REST sync sidecar
#    (apps/garmin-bridge/). Disabled by default — when enabled is false the
#    chart renders no bridge Deployment/Service/Secret/CronJob at all. See
#    apps/garmin-bridge/README.md for the one-time MFA login bootstrap.
garminBridge:
  enabled: false

  image:
    repository: ghcr.io/vinzenzs/garmin-bridge
    # -- Defaults to the chart appVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent

  # -- IANA timezone the daily sync resolves "today" in (the user's local day).
  syncTz: UTC

  # -- Rolling-window lookback for the dateless daily sync. Each cron run POSTs
  #    /sync with no date, which re-pulls today + this many prior days (default
  #    2 → a 3-day window). A same-day-only sync misses a day's own completed
  #    activities (they happen after the 05:00 run) and Garmin's later-computed
  #    training-load / VO2max / race-predictor metrics (recomputed once activities
  #    process); re-pulling recent days lets those late signals land. Date-keyed
  #    upserts + external_id workout dedup make the re-pull safe. 0 = today only.
  syncLookbackDays: 2

  # -- Backend base URL the bridge POSTs to. Empty → the in-cluster backend
  #    Service DNS (http://<fullname>:<service.port>).
  nutritionApiUrl: ""

  # -- Reference an externally-managed Secret instead of the chart-rendered one.
  #    Must contain keys: GARMIN_EMAIL, GARMIN_PASSWORD, GARMIN_API_TOKEN.
  existingSecret: ""

  # -- Secret values for the chart-rendered Secret. REQUIRED when enabled and
  #    existingSecret is empty. GARMIN_API_TOKEN must equal the backend's
  #    configured GARMIN_API_TOKEN (the `garmin` identity).
  secrets:
    garminEmail: ""
    garminPassword: ""
    garminApiToken: ""

  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # -- History backfill pacing (POST /sync/backfill — an explicit, agent/operator
  #    triggered range replay, NOT scheduled). dayDelaySeconds paces Garmin calls
  #    between days; maxDays caps the range so a typo can't launch a year-long
  #    crawl. The steady-state rolling-window CronJob below is unaffected.
  backfill:
    dayDelaySeconds: 3
    maxDays: 120

  # -- Daily sync CronJob that POSTs /sync on the bridge Service.
  cron:
    enabled: true
    # -- 05:00 in the cluster's timezone by default.
    schedule: "0 5 * * *"
    # -- Tiny image with curl + a POSIX shell for the trigger.
    image: curlimages/curl:8.7.1
    # -- First-run backfill: when > 0, the Job loops POST /sync over the last N
    #    days (safe to re-run — date upserts + external_id dedup). Set back to 0
    #    after the initial import.
    backfillDays: 0
